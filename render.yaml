services:
  - type: web
    name: nexus-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn src.server.main:app --host 0.0.0.0 --port 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.x
      - key: ENVIRONMENT
        value: production
